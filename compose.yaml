services:
  postgres:
    image: docker.io/tensorchord/vchord-postgres:pg16-v0.2.2
    container_name: rag-ebook-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-rag_ebooks}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - rag-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-user} -d ${POSTGRES_DB:-rag_ebooks}"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Containerfile
      target: runtime
    container_name: rag-ebook-api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql+asyncpg://user:password@postgres:5432/rag_ebooks}
      - LMSTUDIO_BASE_URL=${LMSTUDIO_BASE_URL:-http://host.containers.internal:1234/v1}
      - LMSTUDIO_API_KEY=${LMSTUDIO_API_KEY:-lm-studio}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-text-embedding-nomic-embed-text-v1.5}
      - LLM_MODEL=${LLM_MODEL:-llama-3.2-3b-instruct}
      - CHUNK_SIZE=${CHUNK_SIZE:-1000}
      - CHUNK_OVERLAP=${CHUNK_OVERLAP:-200}
      - APP_HOST=0.0.0.0
      - APP_PORT=8000
    networks:
      - rag-network
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy

  streamlit:
    build:
      context: .
      dockerfile: Containerfile
      target: runtime
    container_name: rag-ebook-ui
    ports:
      - "8501:8501"
    environment:
      - API_BASE_URL=http://api:8000
      - PYTHONPATH=/app/src
    command: ["streamlit", "run", "src/rag_ebook_search/streamlit_app.py", "--server.port=8501", "--server.address=0.0.0.0"]
    depends_on:
      - api
    networks:
      - rag-network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  rag-network:
    driver: bridge
