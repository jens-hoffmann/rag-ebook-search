[tox]
envlist = test, lint, type
isolated_build = true

[testenv]
deps = -r requirements/test.txt
setenv =
    PYTHONPATH = {toxinidir}/src
commands =
    pytest tests/unit -v {posargs}

[testenv:integration]
deps =
    {[testenv]deps}
description = Run integration tests using testcontainers + PostgreSQL with VectorChord
setenv =
    PYTHONPATH = {toxinidir}/src
    TESTCONTAINERS_RYUK_DISABLED = true
commands =
    pytest tests/integration -v {posargs}

[testenv:lint]
deps =
    ruff>=0.2.0
commands =
    ruff check src tests
    ruff format --check src tests

[testenv:type]
deps =
    mypy>=1.8.0
    types-beautifulsoup4
    pytest>=8.0.0
    pytest-asyncio>=0.23.0
    httpx>=0.26.0
    fastapi>=0.109.0
    uvicorn[standard]>=0.27.0
    sqlalchemy>=2.0.25
    asyncpg>=0.29.0
    psycopg2-binary>=2.9.9
    langchain>=0.3.0
    langchain-community>=0.3.0
    langchain-openai>=0.2.0
    langchain-postgres>=0.0.12
    pypdf>=3.17.0
    ebooklib>=0.17
    beautifulsoup4>=4.12.0
    lxml>=4.9.0
    python-multipart>=0.0.7
    python-dotenv>=1.0.0
    streamlit>=1.30.0
    pydantic>=2.5.0
    pydantic-settings>=2.1.0
setenv =
    PYTHONPATH = {toxinidir}/src
commands =
    mypy src
